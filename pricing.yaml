# Claude API pricing — USD per million tokens.
# Updated: 2026-04-09  Source: https://docs.anthropic.com/en/docs/about-claude/pricing
#
# To override, copy this file to ~/.mac-monitor/pricing.yaml and edit.
# Unknown models fall back to the "default" entry and show a warning in the UI.
#
# Cache pricing multipliers (relative to base input):
#   cache_read  = 0.1x base input   (cache hit)
#   cache_write_5m  = 1.25x base input  (5-minute TTL)
#   cache_write_1h  = 2x base input     (1-hour TTL)

models:
  # ── Opus family ──────────────────────────────────────────────
  claude-opus-4-6:
    input: 5.00
    output: 25.00
    cache_read: 0.50
    cache_write_5m: 6.25
    cache_write_1h: 10.00
    context_window: 1000000

  claude-opus-4-5:
    input: 5.00
    output: 25.00
    cache_read: 0.50
